<!-- 管理者パネル - 横スライド方式（再構築版） -->
<div class="admin-slide-panel">

        <h2><i class="fas fa-cog"></i> 管理者パネル</h2>
        <p class="admin-slide-subtitle">データ管理・設定</p>
    </div>
    
    <!-- タブナビゲーション -->
    <div class="admin-slide-tabs">
        <button class="admin-slide-tab active" data-tab="dashboard">
            <i class="fas fa-chart-line"></i>
            <span>ダッシュボード</span>
        </button>
        <button class="admin-slide-tab" data-tab="members">

        </button>
        <button class="admin-slide-tab" data-tab="testimonials">
            <i class="fas fa-comments"></i>

        <button class="admin-slide-tab" data-tab="faqs">

        </button>
        <button class="admin-slide-tab" data-tab="images">

        <button class="admin-slide-tab" data-tab="settings">

            <span>設定</span>
        </button>
    </div>
