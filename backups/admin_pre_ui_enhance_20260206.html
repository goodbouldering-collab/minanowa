<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ページ - みんなのWA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--c1:#10b981;--c2:#059669;--c3:#34d399;--c4:#6ee7b7;--c5:#a7f3d0;
  --cbg:#f0fdf4;--td:#1e293b;--tl:#64748b;--white:#fff;
  --glass:rgba(255,255,255,.72);
  --sh:0 4px 24px rgba(16,185,129,.10);--sh2:0 12px 40px rgba(16,185,129,.18);
  --sh-glow:0 0 30px rgba(16,185,129,.20);
  --r:14px;--r2:10px;--r3:20px;--transition:.3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;color:var(--td);background:var(--cbg);font-size:13px;
  line-height:1.5;letter-spacing:-.01em;min-height:100vh}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:inherit;font-size:inherit}
::selection{background:var(--c3);color:#fff}

/* BG */
.bg-shape{position:fixed;border-radius:50%;pointer-events:none;z-index:-1;filter:blur(80px);opacity:.06}
.bg-shape.s1{width:400px;height:400px;background:var(--c1);top:10%;left:-5%}
.bg-shape.s2{width:300px;height:300px;background:var(--c3);bottom:5%;right:-5%}

/* NAV */
.admin-nav{background:var(--glass);backdrop-filter:blur(20px);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.8rem;
  box-shadow:0 1px 12px rgba(16,185,129,.06);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(16,185,129,.08)}
.admin-nav .logo{font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,var(--c1),var(--c2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.admin-nav .badge{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;font-size:.58rem;
  font-weight:700;padding:.15rem .5rem;border-radius:10px;letter-spacing:.05em;box-shadow:0 2px 8px rgba(16,185,129,.3)}
.admin-nav .spacer{flex:1}

/* MENU */
.menu-wrap{background:var(--glass);backdrop-filter:blur(15px);border-bottom:1px solid rgba(16,185,129,.06);
  position:sticky;top:43px;z-index:99}
.menu-track{display:flex;gap:.35rem;overflow-x:auto;padding:.55rem 1rem;scroll-behavior:smooth;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.menu-track::-webkit-scrollbar{display:none}
.menu-item{flex-shrink:0;padding:.4rem .85rem;border-radius:var(--r3);font-size:.73rem;font-weight:600;
  cursor:pointer;border:1.5px solid rgba(16,185,129,.12);background:var(--white);color:var(--tl);
  transition:var(--transition);display:flex;align-items:center;gap:.35rem;white-space:nowrap;position:relative;overflow:hidden}
.menu-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--c1),var(--c2));
  opacity:0;transition:var(--transition)}
.menu-item span,.menu-item i{position:relative;z-index:1}
.menu-item:hover{border-color:var(--c1);color:var(--c1);transform:translateY(-1px);box-shadow:0 2px 10px rgba(16,185,129,.1)}
.menu-item.active{border-color:var(--c1);color:#fff;box-shadow:0 4px 15px rgba(16,185,129,.25)}
.menu-item.active::before{opacity:1}
.menu-item i{font-size:.7rem}

/* PANEL */
.panel{display:none;max-width:1100px;margin:0 auto;padding:1.2rem;animation:panel-in .35s ease}
.panel.active{display:block}
@keyframes panel-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.panel-head h2{font-size:1.15rem;font-weight:800;display:flex;align-items:center;gap:.4rem;
  background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  position:relative}
.panel-head h2::after{content:'';position:absolute;bottom:-3px;left:0;width:30px;height:2.5px;
  background:linear-gradient(90deg,var(--c1),var(--c3));border-radius:2px}

/* SHARED */
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.4rem .85rem;border-radius:var(--r3);border:none;
  font-weight:600;font-size:.75rem;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
  opacity:0;transition:var(--transition)}
.btn:hover::after{opacity:1}
.btn-primary{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;box-shadow:0 3px 12px rgba(16,185,129,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(16,185,129,.35)}
.btn-outline{background:transparent;border:1.5px solid var(--c1);color:var(--c1)}
.btn-outline:hover{background:var(--c1);color:#fff;box-shadow:var(--sh-glow)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 2px 8px rgba(239,68,68,.2)}
.btn-danger:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(239,68,68,.3)}
.btn-sm{padding:.3rem .6rem;font-size:.7rem}
.btn-full{width:100%;justify-content:center}

.fg{margin-bottom:.6rem}
.fg label{display:block;font-weight:600;font-size:.75rem;margin-bottom:.15rem;color:var(--td)}
.fg input,.fg select,.fg textarea{width:100%;padding:.45rem .6rem;
  border:1.5px solid rgba(16,185,129,.12);border-radius:var(--r2);
  font-size:.8rem;transition:var(--transition);background:rgba(255,255,255,.8);backdrop-filter:blur(4px)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--c1);
  box-shadow:0 0 0 3px rgba(16,185,129,.1),0 4px 12px rgba(16,185,129,.06)}
.fg textarea{resize:vertical;min-height:60px}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid rgba(16,185,129,.08);
  background:var(--glass);backdrop-filter:blur(10px)}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{background:rgba(16,185,129,.04);font-weight:600;text-align:left;padding:.55rem .7rem;color:var(--c2);
  white-space:nowrap;border-bottom:1.5px solid rgba(16,185,129,.1)}
td{padding:.5rem .7rem;border-bottom:1px solid rgba(16,185,129,.04);vertical-align:middle;transition:var(--transition)}
tr:hover td{background:rgba(16,185,129,.02)}
.tbl-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(16,185,129,.15)}

/* ADMIN CARD */
.admin-card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.5);
  border-radius:var(--r);box-shadow:var(--sh);padding:.9rem;margin-bottom:.6rem;transition:var(--transition)}
.admin-card:hover{box-shadow:var(--sh2);border-color:rgba(16,185,129,.12)}

/* STAT */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.6rem;margin-bottom:1rem}
.stat-box{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.5);
  border-radius:var(--r);box-shadow:var(--sh);padding:.8rem 1rem;text-align:center;
  transition:var(--transition);position:relative;overflow:hidden;cursor:default}
.stat-box::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(16,185,129,.03),transparent);transition:var(--transition)}
.stat-box:hover{transform:translateY(-3px);box-shadow:var(--sh2);border-color:rgba(16,185,129,.15)}
.stat-box:hover::before{background:linear-gradient(135deg,rgba(16,185,129,.06),transparent)}
.stat-box .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin:0 auto .4rem;font-size:.9rem;color:#fff;
  background:linear-gradient(135deg,var(--c1),var(--c2));box-shadow:0 3px 10px rgba(16,185,129,.25)}
.stat-box .num{font-size:1.6rem;font-weight:900;
  background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-box .lbl{font-size:.7rem;color:var(--tl);font-weight:500}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);
  z-index:2000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-box{background:var(--white);border-radius:var(--r);padding:1.3rem;max-width:520px;width:92%;
  max-height:85vh;overflow-y:auto;animation:su .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 25px 60px rgba(0,0,0,.2);border:1px solid rgba(16,185,129,.06)}
@keyframes su{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-close{float:right;font-size:1.2rem;cursor:pointer;color:var(--tl);background:none;border:none;
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.modal-close:hover{color:var(--c1);background:rgba(16,185,129,.08)}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem;
  background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* CHART placeholder */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:50px;padding:.3rem 0}
.mini-bar{flex:1;border-radius:3px 3px 0 0;transition:var(--transition);cursor:default;min-width:8px;
  background:linear-gradient(180deg,var(--c1),var(--c2))}
.mini-bar:hover{opacity:.7;transform:scaleY(1.05);transform-origin:bottom}

/* Recent activity */
.activity-item{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px solid rgba(16,185,129,.04)}
.activity-item:last-child{border:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--c1),var(--c3))}
.activity-text{font-size:.75rem;flex:1}
.activity-time{font-size:.65rem;color:var(--tl)}

@media(max-width:768px){
  .stat-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="bg-shape s1"></div>
<div class="bg-shape s2"></div>

<!-- NAV -->
<div class="admin-nav">
  <a href="/" class="logo">みんなのWA</a>
  <span class="badge">ADMIN</span>
  <span class="spacer"></span>
  <span id="adminName" style="font-size:.78rem;font-weight:600"></span>
  <a href="/" class="btn btn-outline btn-sm"><i class="fas fa-home"></i> <span>サイト</span></a>
  <button class="btn btn-outline btn-sm" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>

<!-- MENU -->
<div class="menu-wrap">
  <div class="menu-track" id="menuTrack">
    <div class="menu-item active" onclick="showPanel('dash',this)"><i class="fas fa-chart-pie"></i><span>ダッシュボード</span></div>
    <div class="menu-item" onclick="showPanel('hero',this)"><i class="fas fa-image"></i><span>トップページ編集</span></div>
    <div class="menu-item" onclick="showPanel('events',this)"><i class="fas fa-calendar-alt"></i><span>イベント管理</span></div>
    <div class="menu-item" onclick="showPanel('blogs',this)"><i class="fas fa-newspaper"></i><span>ブログ管理</span></div>
    <div class="menu-item" onclick="showPanel('members',this)"><i class="fas fa-users"></i><span>メンバー管理</span></div>
    <div class="menu-item" onclick="showPanel('boards',this)"><i class="fas fa-comments"></i><span>掲示板管理</span></div>
    <div class="menu-item" onclick="showPanel('backup',this)"><i class="fas fa-database"></i><span>バックアップ</span></div>
  </div>
</div>

<!-- ========== PANELS ========== -->

<!-- DASHBOARD -->
<div class="panel active" id="panel-dash">
  <div class="panel-head"><h2><i class="fas fa-chart-pie"></i> ダッシュボード</h2></div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="num" id="dMem">0</div><div class="lbl">メンバー</div></div>
    <div class="stat-box"><div class="stat-icon"><i class="fas fa-calendar"></i></div><div class="num" id="dEv">0</div><div class="lbl">イベント</div></div>
    <div class="stat-box"><div class="stat-icon"><i class="fas fa-newspaper"></i></div><div class="num" id="dBlog">0</div><div class="lbl">ブログ</div></div>
    <div class="stat-box"><div class="stat-icon"><i class="fas fa-comments"></i></div><div class="num" id="dBoard">0</div><div class="lbl">掲示板</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
    <div class="admin-card">
      <h3 style="font-size:.82rem;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem"><i class="fas fa-chart-bar" style="color:var(--c1)"></i> 月間アクティビティ</h3>
      <div class="mini-chart" id="miniChart"></div>
    </div>
    <div class="admin-card">
      <h3 style="font-size:.82rem;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem"><i class="fas fa-bolt" style="color:var(--c1)"></i> 最近の動き</h3>
      <div id="activityList"></div>
    </div>
  </div>
  <div class="admin-card" style="margin-top:.6rem">
    <h3 style="font-size:.82rem;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem"><i class="fas fa-user-clock" style="color:var(--c1)"></i> 最新メンバー</h3>
    <div class="tbl-wrap"><table><thead><tr><th></th><th>名前</th><th>業種</th><th>地域</th><th>登録日</th></tr></thead><tbody id="dMemTbl"></tbody></table></div>
  </div>
</div>

<!-- HERO EDIT -->
<div class="panel" id="panel-hero">
  <div class="panel-head"><h2><i class="fas fa-image"></i> トップページ編集</h2></div>
  <div class="admin-card">
    <form onsubmit="saveHero(event)">
      <div class="fg"><label><i class="fas fa-heading" style="color:var(--c1)"></i> ヒーロータイトル</label><input id="hTitle"></div>
      <div class="fg"><label><i class="fas fa-align-left" style="color:var(--c1)"></i> ヒーローサブタイトル</label><input id="hSub"></div>
      <div class="fg"><label><i class="fas fa-info-circle" style="color:var(--c1)"></i> aboutタイトル</label><input id="hAbout"></div>
      <div class="fg"><label><i class="fas fa-file-alt" style="color:var(--c1)"></i> aboutサブタイトル</label><input id="hAboutText"></div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
    </form>
  </div>
  <div class="admin-card" style="margin-top:.4rem">
    <h3 style="font-size:.82rem;font-weight:700;margin-bottom:.3rem"><i class="fas fa-eye" style="color:var(--c1)"></i> プレビュー</h3>
    <div style="background:linear-gradient(135deg,#059669,#047857);border-radius:var(--r2);padding:1.2rem;text-align:center;color:#fff">
      <div style="font-size:1.1rem;font-weight:900" id="prevTitle">--</div>
      <div style="font-size:.78rem;opacity:.85;margin-top:.2rem" id="prevSub">--</div>
    </div>
  </div>
</div>

<!-- EVENTS -->
<div class="panel" id="panel-events">
  <div class="panel-head"><h2><i class="fas fa-calendar-alt"></i> イベント管理</h2>
    <button class="btn btn-primary" onclick="openEventForm()"><i class="fas fa-plus"></i> 新規作成</button></div>
  <div class="tbl-wrap"><table><thead><tr><th>タイトル</th><th>日時</th><th>場所</th><th>定員</th><th>申込</th><th>操作</th></tr></thead><tbody id="evTbl"></tbody></table></div>
</div>

<!-- BLOGS -->
<div class="panel" id="panel-blogs">
  <div class="panel-head"><h2><i class="fas fa-newspaper"></i> ブログ・お知らせ管理</h2>
    <button class="btn btn-primary" onclick="openBlogForm()"><i class="fas fa-plus"></i> 新規作成</button></div>
  <div class="tbl-wrap"><table><thead><tr><th>タイトル</th><th>カテゴリ</th><th>日付</th><th>操作</th></tr></thead><tbody id="blogTbl"></tbody></table></div>
</div>

<!-- MEMBERS -->
<div class="panel" id="panel-members">
  <div class="panel-head"><h2><i class="fas fa-users"></i> メンバー管理</h2></div>
  <div class="tbl-wrap"><table><thead><tr><th></th><th>名前</th><th>業種</th><th>メール</th><th>地域</th><th>管理者</th><th>操作</th></tr></thead><tbody id="memTbl"></tbody></table></div>
</div>

<!-- BOARDS -->
<div class="panel" id="panel-boards">
  <div class="panel-head"><h2><i class="fas fa-comments"></i> 掲示板管理</h2></div>
  <div id="boardAdminList"></div>
</div>

<!-- BACKUP -->
<div class="panel" id="panel-backup">
  <div class="panel-head"><h2><i class="fas fa-database"></i> バックアップ</h2></div>
  <div class="admin-card">
    <div style="display:flex;align-items:center;gap:.8rem">
      <div class="stat-icon" style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;background:linear-gradient(135deg,var(--c1),var(--c2));box-shadow:0 3px 10px rgba(16,185,129,.25)"><i class="fas fa-shield-alt"></i></div>
      <div><div style="font-weight:700;font-size:.85rem">データバックアップ</div><div style="font-size:.72rem;color:var(--tl)">全データのJSONバックアップを作成します</div></div>
    </div>
    <div style="margin-top:.6rem">
      <button class="btn btn-primary" onclick="doBackup()"><i class="fas fa-download"></i> バックアップ作成</button>
    </div>
    <div id="backupResult" style="margin-top:.4rem;font-size:.78rem;color:var(--c2)"></div>
  </div>
</div>

<!-- MODALS -->
<div id="evModal" class="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeM('evModal')">&times;</button>
    <div class="modal-title"><i class="fas fa-calendar-plus"></i> <span id="evFormTitle">イベント作成</span></div>
    <form onsubmit="saveEvent(event)">
      <input type="hidden" id="evId">
      <div class="fg"><label>タイトル *</label><input id="evTitle" required></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 .5rem">
        <div class="fg"><label>日付 *</label><input type="date" id="evDate" required></div>
        <div class="fg"><label>時間 *</label><input id="evTime" required placeholder="19:00-21:00"></div>
      </div>
      <div class="fg"><label>場所 *</label><input id="evLoc" required></div>
      <div class="fg"><label>説明</label><textarea id="evDesc"></textarea></div>
      <div class="fg"><label>詳細情報</label><textarea id="evDetail"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 .5rem">
        <div class="fg"><label>定員</label><input type="number" id="evCap" value="30"></div>
        <div class="fg"><label>参加費</label><input id="evFee" placeholder="2,000円"></div>
      </div>
      <div class="fg"><label>画像URL</label><input id="evImg"></div>
      <div class="fg"><label>または画像アップロード</label><input type="file" id="evImgFile" accept="image/*" onchange="uploadImg(this,'evImg')"></div>
      <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-save"></i> 保存</button>
    </form>
  </div>
</div>

<div id="blogModal" class="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeM('blogModal')">&times;</button>
    <div class="modal-title"><i class="fas fa-pen-fancy"></i> <span id="blogFormTitle">ブログ作成</span></div>
    <form onsubmit="saveBlog(event)">
      <input type="hidden" id="blogId">
      <div class="fg"><label>タイトル *</label><input id="blogTitle" required></div>
      <div class="fg"><label>カテゴリ *</label>
        <select id="blogCat"><option>ブログ</option><option>お知らせ</option><option>活動レポート</option></select>
      </div>
      <div class="fg"><label>概要</label><textarea id="blogExcerpt"></textarea></div>
      <div class="fg"><label>本文</label><textarea id="blogContent" style="min-height:100px"></textarea></div>
      <div class="fg"><label>画像URL</label><input id="blogImg"></div>
      <div class="fg"><label>または画像アップロード</label><input type="file" id="blogImgFile" accept="image/*" onchange="uploadImg(this,'blogImg')"></div>
      <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-save"></i> 保存</button>
    </form>
  </div>
</div>

<script>
let admin=null,members=[],events=[],blogs=[],boards=[],settings={};

document.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('wa_user');
  if(saved){
    admin=JSON.parse(saved);
    if(!admin.isAdmin){alert('管理者権限がありません');window.location.href='/';return}
    document.getElementById('adminName').textContent=admin.name;
    loadAll();
  }else{window.location.href='/';}
});

async function loadAll(){
  [members,events,blogs,boards,settings]=await Promise.all([
    fetch('/api/members').then(r=>r.json()),
    fetch('/api/events').then(r=>r.json()),
    fetch('/api/blogs').then(r=>r.json()),
    fetch('/api/boards').then(r=>r.json()),
    fetch('/api/site-settings').then(r=>r.json())
  ]);
  renderDash();renderEvTbl();renderBlogTbl();renderMemTbl();renderBoardAdmin();
  document.getElementById('hTitle').value=settings.heroTitle||'';
  document.getElementById('hSub').value=settings.heroSubtitle||'';
  document.getElementById('hAbout').value=settings.aboutTitle||'';
  document.getElementById('hAboutText').value=settings.aboutText||'';
  updatePreview();
  // live preview
  ['hTitle','hSub'].forEach(id=>document.getElementById(id).addEventListener('input',updatePreview));
}

function updatePreview(){
  document.getElementById('prevTitle').textContent=document.getElementById('hTitle').value||'--';
  document.getElementById('prevSub').textContent=document.getElementById('hSub').value||'--';
}

function showPanel(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

// Dashboard
function renderDash(){
  document.getElementById('dMem').textContent=members.length;
  document.getElementById('dEv').textContent=events.length;
  document.getElementById('dBlog').textContent=blogs.length;
  document.getElementById('dBoard').textContent=boards.length;

  // Mini chart (fake monthly data)
  const chart=document.getElementById('miniChart');chart.innerHTML='';
  const vals=[3,5,8,6,10,12,9,14,11,15,13,members.length];
  const max=Math.max(...vals);
  vals.forEach((v,i)=>{
    const h=Math.max((v/max)*100,8);
    chart.innerHTML+=`<div class="mini-bar" style="height:${h}%;opacity:${.5+i/vals.length*.5}" title="${['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'][i]}: ${v}"></div>`;
  });

  // Activity list
  const act=document.getElementById('activityList');act.innerHTML='';
  const activities=[
    {text:`メンバー ${members.length}名が登録中`,time:'最新'},
    {text:`イベント ${events.length}件が登録済み`,time:'累計'},
    {text:`ブログ ${blogs.length}件が公開中`,time:'累計'},
    {text:`掲示板 ${boards.length}件の投稿`,time:'累計'}
  ];
  activities.forEach(a=>{
    act.innerHTML+=`<div class="activity-item"><div class="activity-dot"></div><div class="activity-text">${a.text}</div><div class="activity-time">${a.time}</div></div>`;
  });

  // Recent members table
  const tbl=document.getElementById('dMemTbl');tbl.innerHTML='';
  members.slice(-5).reverse().forEach(m=>{
    tbl.innerHTML+=`<tr><td><img class="tbl-avatar" src="${m.avatar||'https://i.pravatar.cc/40'}" onerror="this.src='https://i.pravatar.cc/40'"></td>
      <td style="font-weight:600">${m.name}</td><td>${m.businessCategory||''}</td><td>${m.location||''}</td><td>${m.joinDate||''}</td></tr>`;
  });
}

// Hero
async function saveHero(e){
  e.preventDefault();
  const body={heroTitle:document.getElementById('hTitle').value,heroSubtitle:document.getElementById('hSub').value,
    aboutTitle:document.getElementById('hAbout').value,aboutText:document.getElementById('hAboutText').value};
  const r=await fetch('/api/site-settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  if(r.success) alert('保存しました');
}

// Events
function renderEvTbl(){
  const t=document.getElementById('evTbl');t.innerHTML='';
  events.forEach(ev=>{
    const regCount=(ev.registrations||[]).length;
    t.innerHTML+=`<tr><td style="font-weight:600">${ev.title}</td><td>${ev.date} ${ev.time}</td><td>${ev.location}</td>
      <td>${ev.participants||''}</td><td><span style="color:var(--c1);font-weight:700">${regCount}</span></td>
      <td style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="editEvent('${ev.id}')"><i class="fas fa-edit"></i></button>
      <button class="btn btn-danger btn-sm" onclick="delEvent('${ev.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
  });
}
function openEventForm(ev){
  document.getElementById('evFormTitle').textContent=ev?'イベント編集':'イベント作成';
  document.getElementById('evId').value=ev?ev.id:'';
  document.getElementById('evTitle').value=ev?ev.title:'';
  document.getElementById('evDate').value=ev?ev.date:'';
  document.getElementById('evTime').value=ev?ev.time:'';
  document.getElementById('evLoc').value=ev?ev.location:'';
  document.getElementById('evDesc').value=ev?ev.description:'';
  document.getElementById('evDetail').value=ev?ev.detailedInfo:'';
  document.getElementById('evCap').value=ev?ev.participants:30;
  document.getElementById('evFee').value=ev?ev.fee:'';
  document.getElementById('evImg').value=ev?ev.imageUrl:'';
  openM('evModal');
}
function editEvent(id){openEventForm(events.find(e=>e.id===id))}
async function saveEvent(e){
  e.preventDefault();
  const id=document.getElementById('evId').value;
  const body={title:document.getElementById('evTitle').value,date:document.getElementById('evDate').value,
    time:document.getElementById('evTime').value,location:document.getElementById('evLoc').value,
    description:document.getElementById('evDesc').value,detailedInfo:document.getElementById('evDetail').value,
    participants:parseInt(document.getElementById('evCap').value),fee:document.getElementById('evFee').value,
    imageUrl:document.getElementById('evImg').value};
  const url=id?`/api/admin/events/${id}`:'/api/admin/events';
  const r=await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  if(r.success){closeM('evModal');loadAll()}
}
async function delEvent(id){if(confirm('削除しますか？')){await fetch(`/api/admin/events/${id}`,{method:'DELETE'});loadAll()}}

// Blogs
function renderBlogTbl(){
  const t=document.getElementById('blogTbl');t.innerHTML='';
  blogs.forEach(b=>{
    t.innerHTML+=`<tr><td style="font-weight:600">${b.title}</td>
      <td><span style="background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;padding:.12rem .45rem;border-radius:8px;font-size:.62rem;font-weight:700">${b.category}</span></td>
      <td>${b.date}</td>
      <td style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="editBlog('${b.id}')"><i class="fas fa-edit"></i></button>
      <button class="btn btn-danger btn-sm" onclick="delBlog('${b.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
  });
}
function openBlogForm(b){
  document.getElementById('blogFormTitle').textContent=b?'ブログ編集':'ブログ作成';
  document.getElementById('blogId').value=b?b.id:'';
  document.getElementById('blogTitle').value=b?b.title:'';
  document.getElementById('blogCat').value=b?b.category:'ブログ';
  document.getElementById('blogExcerpt').value=b?b.excerpt:'';
  document.getElementById('blogContent').value=b?b.content:'';
  document.getElementById('blogImg').value=b?b.imageUrl:'';
  openM('blogModal');
}
function editBlog(id){openBlogForm(blogs.find(b=>b.id===id))}
async function saveBlog(e){
  e.preventDefault();
  const id=document.getElementById('blogId').value;
  const body={title:document.getElementById('blogTitle').value,category:document.getElementById('blogCat').value,
    excerpt:document.getElementById('blogExcerpt').value,content:document.getElementById('blogContent').value,
    imageUrl:document.getElementById('blogImg').value,author:admin.name};
  const url=id?`/api/admin/blogs/${id}`:'/api/admin/blogs';
  const r=await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  if(r.success){closeM('blogModal');loadAll()}
}
async function delBlog(id){if(confirm('削除しますか？')){await fetch(`/api/admin/blogs/${id}`,{method:'DELETE'});loadAll()}}

// Members
function renderMemTbl(){
  const t=document.getElementById('memTbl');t.innerHTML='';
  members.forEach(m=>{
    t.innerHTML+=`<tr><td><img class="tbl-avatar" src="${m.avatar||'https://i.pravatar.cc/40'}" onerror="this.src='https://i.pravatar.cc/40'"></td>
      <td style="font-weight:600">${m.name}</td><td>${m.businessCategory||''}</td><td style="font-size:.68rem;color:var(--tl)">${m.email}</td>
      <td>${m.location||''}</td>
      <td>${m.isAdmin?'<span style="background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;padding:.1rem .4rem;border-radius:6px;font-size:.6rem;font-weight:700">管理者</span>':''}</td>
      <td style="white-space:nowrap">${m.id!=='admin-001'?`<button class="btn btn-outline btn-sm" onclick="toggleAdmin('${m.id}',${!m.isAdmin})">${m.isAdmin?'解除':'権限付与'}</button>
        <button class="btn btn-danger btn-sm" onclick="delMember('${m.id}')"><i class="fas fa-trash"></i></button>`:''}</td></tr>`;
  });
}
async function toggleAdmin(id,val){
  await fetch(`/api/admin/members/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({isAdmin:val})});loadAll();
}
async function delMember(id){if(confirm('削除しますか？')){await fetch(`/api/admin/members/${id}`,{method:'DELETE'});loadAll()}}

// Boards
function renderBoardAdmin(){
  const el=document.getElementById('boardAdminList');el.innerHTML='';
  if(!boards.length){el.innerHTML='<div class="admin-card" style="text-align:center;color:var(--tl)">投稿はありません</div>';return}
  boards.forEach(b=>{
    el.innerHTML+=`<div class="admin-card" style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem">
          <span style="background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;padding:.1rem .4rem;border-radius:6px;font-size:.58rem;font-weight:700">${b.category||''}</span>
          <span style="font-weight:700;font-size:.82rem">${b.title}</span>
        </div>
        <div style="font-size:.7rem;color:var(--tl)">${b.authorName} / ${new Date(b.createdAt).toLocaleDateString('ja-JP')} / 返信${(b.replies||[]).length}件</div>
        <div style="font-size:.75rem;margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.content}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="delBoard('${b.id}')"><i class="fas fa-trash"></i></button>
    </div>`;
  });
}
async function delBoard(id){if(confirm('削除しますか？')){await fetch(`/api/admin/boards/${id}`,{method:'DELETE'});loadAll()}}

// Backup
async function doBackup(){
  const r=await fetch('/api/admin/backup').then(r=>r.json());
  document.getElementById('backupResult').innerHTML=r.success?`<i class="fas fa-check-circle"></i> バックアップ完了: ${r.filename}`:'<i class="fas fa-times-circle" style="color:#ef4444"></i> エラー';
}

// Upload helper
async function uploadImg(input,targetId){
  const file=input.files[0];if(!file) return;
  const fd=new FormData();fd.append('image',file);
  const r=await fetch('/api/upload',{method:'POST',body:fd}).then(r=>r.json());
  if(r.success) document.getElementById(targetId).value=r.url;
}

// Modal
function openM(id){document.getElementById(id).classList.add('active')}
function closeM(id){document.getElementById(id).classList.remove('active')}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal'))e.target.classList.remove('active')});

function adminLogout(){localStorage.removeItem('wa_user');window.location.href='/';}
</script>
</body>
</html>
