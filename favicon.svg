<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset=".4" stop-color="#fbbf24"/>
      <stop offset=".75" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#9a3412"/>
    </linearGradient>
    <radialGradient id="shine" cx=".28" cy=".22" r=".75">
      <stop offset="0" stop-color="#fff" stop-opacity=".55"/>
      <stop offset=".55" stop-color="#fff" stop-opacity=".05"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="ringB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" ry="22" fill="url(#shine)"/>

  <g filter="url(#glow)" opacity=".55">
    <circle cx="38" cy="50" r="22" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="62" cy="50" r="22" fill="none" stroke="#fff" stroke-width="2"/>
  </g>

  <circle cx="38" cy="50" r="22" fill="none" stroke="url(#ringA)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="62" cy="50" r="22" fill="none" stroke="url(#ringB)" stroke-width="6" stroke-linecap="round"/>

  <path d="M 50,32 A 22,22 0 0 1 50,68" fill="none" stroke="#fff7ed" stroke-width="6" stroke-linecap="round" opacity=".95"/>

  <circle cx="50" cy="50" r="3.4" fill="#fff"/>
</svg>
