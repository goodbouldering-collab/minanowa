<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- background: 琵琶湖の水面グラデ -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe8f2"/>
      <stop offset=".55" stop-color="#7fc8dc"/>
      <stop offset="1" stop-color="#4a9fb8"/>
    </linearGradient>
    <radialGradient id="sheen" cx=".3" cy=".25" r=".7">
      <stop offset="0" stop-color="rgba(255,255,255,.45)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" ry="22" fill="url(#sheen)"/>
  <!-- 水面さざ波 -->
  <path d="M6 82 Q18 78 30 82 T54 82 T78 82 T98 82" stroke="rgba(255,255,255,.55)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M4 90 Q20 86 36 90 T68 90 T98 90" stroke="rgba(255,255,255,.35)" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 体 -->
  <ellipse cx="58" cy="60" rx="32" ry="22" fill="#7a4d30"/>
  <!-- お腹 -->
  <ellipse cx="52" cy="66" rx="26" ry="14" fill="#f7ecd8"/>
  <!-- 背中グラデ -->
  <ellipse cx="66" cy="52" rx="22" ry="12" fill="#5a3820" opacity=".55"/>
  <!-- 頭 -->
  <ellipse cx="38" cy="34" rx="26" ry="24" fill="#3a2418"/>
  <!-- 頬の栗色 -->
  <path d="M50 30 Q62 32 60 46 Q52 52 42 48 Q38 42 42 36 Q46 30 50 30Z" fill="#b85c3a"/>
  <!-- 頭頂ハイライト -->
  <ellipse cx="32" cy="22" rx="10" ry="5" fill="rgba(255,255,255,.18)"/>
  <!-- 目 -->
  <ellipse cx="28" cy="34" rx="5" ry="5.5" fill="#1a0a04"/>
  <circle cx="29.5" cy="31.5" r="1.7" fill="rgba(255,255,255,.95)"/>
  <circle cx="27" cy="35.5" r=".9" fill="rgba(255,255,255,.7)"/>
  <!-- ほっぺ -->
  <ellipse cx="22" cy="42" rx="4" ry="2.5" fill="rgba(232,120,80,.45)"/>
  <!-- くちばし -->
  <path d="M16 36 Q10 38 6 38 Q4 39 6 40 Q10 41 16 40 Z" fill="#1a0a04"/>
  <path d="M16 38 Q10 39 6 39" stroke="#0a0502" stroke-width=".8" fill="none" stroke-linecap="round"/>
  <circle cx="7" cy="39" r="1" fill="#fef3dc"/>
  <!-- 翼 -->
  <path d="M58 56 Q72 52 78 60 Q70 66 58 62 Z" fill="#2a1810" opacity=".5"/>
  <!-- 飛沫 -->
  <circle cx="88" cy="70" r="1.5" fill="rgba(255,255,255,.85)"/>
  <circle cx="94" cy="78" r="1" fill="rgba(255,255,255,.65)"/>
  <circle cx="6" cy="78" r="1.2" fill="rgba(255,255,255,.75)"/>
</svg>
