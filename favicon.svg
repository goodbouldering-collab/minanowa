<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background circle -->
  <circle cx="32" cy="32" r="30" fill="#fef3dc"/>
  <!-- ears outer -->
  <path d="M12 22L6 8C5 4 10 2 13 6L19 18Z" fill="#d4883a"/>
  <path d="M52 22L58 8C59 4 54 2 51 6L45 18Z" fill="#d4883a"/>
  <!-- ears inner -->
  <path d="M13 20L8 9C7.5 6 11 4 13 7L18 17Z" fill="#f7c77e"/>
  <path d="M51 20L56 9C56.5 6 53 4 51 7L46 17Z" fill="#f7c77e"/>
  <!-- face -->
  <ellipse cx="32" cy="34" rx="22" ry="21" fill="#e8a948"/>
  <ellipse cx="32" cy="37" rx="16" ry="15" fill="#fef3dc"/>
  <!-- eyes sparkly -->
  <ellipse cx="25" cy="32" rx="3" ry="3.3" fill="#2d1b0e"/>
  <ellipse cx="39" cy="32" rx="3" ry="3.3" fill="#2d1b0e"/>
  <circle cx="23.5" cy="30.5" r="1.3" fill="rgba(255,255,255,.85)"/>
  <circle cx="37.5" cy="30.5" r="1.3" fill="rgba(255,255,255,.85)"/>
  <!-- nose -->
  <ellipse cx="32" cy="40" rx="3.5" ry="2.5" fill="#2d1b0e"/>
  <ellipse cx="32" cy="39.3" rx="1.5" ry=".8" fill="rgba(255,255,255,.35)"/>
  <!-- mouth -->
  <path d="M27 44 Q32 49 37 44" fill="none" stroke="#2d1b0e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="18" cy="40" r="4" fill="rgba(255,130,130,.3)"/>
  <circle cx="46" cy="40" r="4" fill="rgba(255,130,130,.3)"/>
  <!-- waving paw -->
  <g transform="rotate(-10 52 26)">
    <path d="M48 48 Q55 38 56 26" fill="none" stroke="#e8a948" stroke-width="5" stroke-linecap="round"/>
    <circle cx="57" cy="23" r="7" fill="#e8a948"/>
    <circle cx="57" cy="23" r="5" fill="#fef3dc"/>
    <circle cx="55" cy="20.5" r="1.5" fill="#f0b87a"/>
    <circle cx="59.5" cy="20.5" r="1.5" fill="#f0b87a"/>
    <circle cx="57" cy="18" r="1.3" fill="#f0b87a"/>
    <circle cx="57" cy="23.5" r="1.8" fill="#f0b87a"/>
  </g>
</svg>
