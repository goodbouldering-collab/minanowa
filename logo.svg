<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <defs>
    <!-- グリーングラデーション -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a8c3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a27;stop-opacity:1" />
    </linearGradient>
    
    <!-- ゴールドアクセント -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a84b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景円 - 「和」の輪を表現 -->
  <circle cx="25" cy="25" r="23" fill="url(#logoGrad)" opacity="0.95"/>
  
  <!-- 中央に「WA」の文字をモチーフにした桜の花びら -->
  <!-- 上の花びら -->
  <path d="M25 5 Q30 12 25 20 Q20 12 25 5" fill="white" opacity="0.95"/>
  <!-- 下の花びら -->
  <path d="M25 45 Q30 38 25 30 Q20 38 25 45" fill="white" opacity="0.95"/>
  <!-- 左の花びら -->
  <path d="M5 25 Q12 20 20 25 Q12 30 5 25" fill="white" opacity="0.95"/>
  <!-- 右の花びら -->
  <path d="M45 25 Q38 20 30 25 Q38 30 45 25" fill="white" opacity="0.95"/>
  
  <!-- 中心の円 - つながりを象徴 -->
  <circle cx="25" cy="25" r="6" fill="url(#accentGrad)"/>
</svg>
