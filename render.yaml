# ============================================================
# render.yaml - Render デプロイ設定
# ============================================================
# Render.com で「New > Blueprint」からこのファイルを使ってデプロイ
# または「New > Web Service」でGitHubリポジトリを接続
# https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: minanowa
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
    healthCheckPath: /
