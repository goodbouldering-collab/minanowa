# ============================================================
# Cloudflare Pages Configuration - みんなのWA
# ============================================================
#
# このプロジェクトはNode.js Express サーバー + ファイルベースDB（data.json）で
# 構成されています。Cloudflare Pages は静的ファイルのホスティングに最適ですが、
# サーバーサイドAPI（Express）を含むため、以下の2つのデプロイ方法があります。
#
# 【方法1】Cloudflare Pages (静的フロントエンドのみ)
#   - index.html, admin.html, favicon.svg を公開
#   - APIは別サーバー（Render, Railway等）にデプロイ
#
# 【方法2】Node.jsホスティング (推奨・フルスタック)
#   - Render, Railway, Fly.io 等にデプロイ
#   - Dockerfile を使用
#   - すべての機能が動作
#
# ============================================================

name = "minanowa"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# ============================================================
# Cloudflare Pages ビルド設定
# ============================================================
# Cloudflare Pages ダッシュボードでの設定:
#   Framework preset: None
#   Build command:    npm run build
#   Build output:     public
#   Root directory:   /
# ============================================================
